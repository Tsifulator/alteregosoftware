{% extends "base.html" %}
{% block content %}
<div class="thanks">
  <div class="check-mark">✓</div>
  <h1>{{ t('thanks_title') }}</h1>
  <p class="sub">{{ t('thanks_body') }}</p>
  <a class="submit-btn" href="/">{{ t('start_over') }}</a>
</div>
{% endblock %}

{% block scripts %}
{% if kiosk %}
<script>
  // Kiosk mode: auto-return to the language picker for the next candidate.
  setTimeout(function () { window.location.href = '/'; }, {{ reset_seconds }} * 1000);
</script>
{% endif %}
{% endblock %}
